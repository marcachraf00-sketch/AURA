<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA - Get My Card</title>

<style>
  body {
    background: #0f172a; 
    color: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
    box-sizing: border-box;
    letter-spacing: -0.01em;
  }

  /* Glassmorphic Container Layout */
  .store-container {
    width: 100%;
    max-width: 800px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 8px 0;
    letter-spacing: -0.02em;
    color: #ffffff;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 15px;
    margin: 0;
  }

  /* Product Selection Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .product-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    padding: 24px;
    text-align: center;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .product-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.12);
  }

  .card-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: inline-block;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
  }

  .product-title {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 6px 0;
    color: #ffffff;
  }

  .product-price {
    font-size: 16px;
    color: #34d399;
    font-weight: 700;
    margin-bottom: 16px;
  }

  /* Input Forms Elements */
  .checkout-section {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    padding: 28px;
    box-sizing: border-box;
  }

  h2 {
    font-size: 20px;
    margin: 0 0 16px 0;
    color: #ffffff;
  }

  label {
    display: block;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
    text-align: left;
  }

  input, textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.02);
    color: white;
    box-sizing: border-box;
    font-size: 14px;
    font-family: inherit;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #3b82f6;
    background: rgba(255, 255, 255, 0.04);
  }

  /* Utility Interactive Buttons */
  button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    transition: all 0.2s ease;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.12);
  }

  button.pay-btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 16px;
    font-size: 15px;
  }

  button.pay-btn:hover {
    background: #2563eb;
  }

  .cart-row {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
</style>
</head>
<body>

<div class="store-container">
  
  <header>
    <h1>AURA Hardware Store</h1>
    <p class="subtitle">Deploy your physical physical NFC identity vector link</p>
  </header>

  <div class="product-grid">
    <div class="product-card">
      <span class="card-icon">⬛</span>
      <div class="product-title">Aura Card - Matte Black</div>
      <div class="product-price">2,500 EGP</div>
      <button onclick="addToOrderCart('Matte Black Card', 2500)">Add To Order</button>
    </div>

    <div class="product-card">
      <span class="card-icon">🧪</span>
      <div class="product-title">Aura Card - Cyber Jade</div>
      <div class="product-price">2,900 EGP</div>
      <button onclick="addToOrderCart('Cyber Jade Card', 2900)">Add To Order</button>
    </div>
  </div>

  <div class="checkout-section">
    <h2>Delivery Details & Checkout</h2>
    
    <label for="cust-shipping">Shipping Delivery Address (Egypt)</label>
    <textarea id="cust-shipping" rows="3" placeholder="Street Name, Building/Apartment No., City, Governorate"></textarea>

    <div class="cart-row">
      <span>Selected Items: <strong id="cart-item-count" style="color: #fff;">0</strong></span>
      <span id="cart-price-total" style="color: #34d399;">0 EGP</span>
    </div>

    <button class="pay-btn" onclick="executeOrderCheckout()">Proceed to Secure Payment</button>
    <button onclick="window.location.href='index.html'" style="margin-top: 12px; background: transparent; border: none; color: #64748b; font-size: 13px;">← Return to Main Portal</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Point straight back to your existing data architecture node
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  let dynamicCart = [];
  let orderTotalEGP = 0;

  function addToOrderCart(styleName, costEGP) {
    dynamicCart.push({ cardStyle: styleName, price: costEGP });
    orderTotalEGP += costEGP;

    // Instantly modify display metrics outputs
    document.getElementById('cart-item-count').innerText = dynamicCart.length;
    document.getElementById('cart-price-total').innerText = orderTotalEGP.toLocaleString() + " EGP";
  }

  async function executeOrderCheckout() {
    const addressInput = document.getElementById('cust-shipping').value;

    if (dynamicCart.length === 0) {
      alert("Your card selection array is empty! Add an item before checking out.");
      return;
    }

    if (!addressInput.trim()) {
      alert("Please specify a valid delivery shipping address coordinates parameters.");
      return;
    }

    // Capture currently logged-in user instance context metrics from authentication layer
    const { data: { user } } = await localSupabase.auth.getUser();
    
    if (!user) {
      alert("No active session identifier found. Please log in first.");
      window.location.href = 'index.html';
      return;
    }

    /* --- EG GATEWAY INTEGRATION ROUTE (Paymob / PayTabs) ---
      Here, you pass the payload to your backend server endpoint, 
      which communicates with your Egyptian gateway provider to generate an iframe checkout link.
    */
    alert("Connecting to Egyptian secure processing framework link...\nTotal Amount: " + orderTotalEGP + " EGP\nUser Identifier: " + user.email);

    // Dynamic fallback link placement illustration
    // window.location.href = "https://egypt.paymob.com/api/acceptance/iframes/...";
  }
</script>

</body>
</html>
