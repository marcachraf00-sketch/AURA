<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
</head>
<body>

<h1 id="name">My Aura Card</h1>

<img
id="avatar"
src="https://www.vecteezy.com/vector-art/3337584-default-avatar-photo-placeholder-profile-icon"
width="150"
>

<p>Level: <span id="level">1</span></p>
<p>XP: <span id="xp">0</span></p>

<input
type="file"
id="avatarInput"
accept="image/*"
>

<button onclick="uploadAvatar()">
Upload Photo
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase =
window.supabase.createClient(
'YOUR_PROJECT_URL',
'YOUR_ANON_KEY'
);

async function loadProfile(){

const {
data:{user}
} =
await supabase.auth.getUser();

if(!user){
window.location.href =
'index.html';
return;
}

const { data } =
await supabase
.from('profiles')
.select('*')
.eq('id',user.id)
.single();

if(data){

document.getElementById('level').innerText =
data.level;

document.getElementById('xp').innerText =
data.xp;

if(data.avatar_url){
document.getElementById('avatar').src =
data.avatar_url;
}
}
}

async function uploadAvatar(){

const file =
document.getElementById('avatarInput')
.files[0];

if(!file) return;

const {
data:{user}
} =
await supabase.auth.getUser();

const fileName =
user.id + "-" + Date.now();

await supabase.storage
.from('avatars')
.upload(fileName,file);

const { data } =
supabase.storage
.from('avatars')
.getPublicUrl(fileName);

await supabase
.from('profiles')
.update({
avatar_url:data.publicUrl
})
.eq('id',user.id);

document.getElementById('avatar').src =
data.publicUrl;
}

loadProfile();
</script>

</body>
</html>
