<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .card {
    width: 320px;                      
    height: 480px;                     
    background: #1e293b;
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
  }

  .card img {
    width: 100%;             
    max-height: 120px;       
    object-fit: cover;       
    border-radius: 15px;     
    margin-bottom: 15px;     
  }

  h1 {
    font-size: 24px;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: 14px;
    color: #bdbdbd;
    margin-bottom: 25px;
  }

  /* Stats Container Layout */
  .stats-container {
    width: 100%;
    margin-bottom: 25px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 15px;
  }

  .stat-label {
    color: #bdbdbd;
  }

  .stat-value {
    font-weight: bold;
    color: #00ff88;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    box-sizing: border-box;
    cursor: pointer;
    background: #ffffff15;
    color: white;
    font-weight: bold;
    transition: background 0.2s;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  #loading-msg {
    font-size: 14px;
    color: #bdbdbd;
  }
</style>
</head>

<body>

<div class="card">
  <!-- Exact banner header image placement -->
  <img src="logo.png" alt="Aura Card Logo">

  <div id="loading-msg">Loading player profile...</div>

  <!-- Profile Content Container -->
  <div id="profile-content" style="display: none; width: 100%;">
    <h1 id="name">My Aura Card</h1>
    <p class="subtitle">Verified Aura Operator</p>

    <div class="stats-container">
      <div class="stat-row">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="level">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">XP</span>
        <span class="stat-value" id="xp">0</span>
      </div>
    </div>

    <button id="logout-btn">Sign Out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  if (!window.supabase) return;

  // Swapped API client settings to use your shared app credentials securely
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  async function loadProfile(){
    const { data:{user}, error: authError } = await localSupabase.auth.getUser();

    if(authError || !user){
      window.location.href = 'index.html';
      return;
    }

    const { data, error: dbError } = await localSupabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (dbError) {
      console.error("Profile row missing:", dbError.message);
    }

    if(data){
      // Set values matching your custom database row values
      document.getElementById('level').innerText = data.level;
      document.getElementById('xp').innerText = data.xp;
      if (data.username) {
        document.getElementById('name').innerText = data.username;
      }
    }

    // Hide loader and show layout cleanly
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  }

  // Bind log-out button action natively
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await localSupabase.auth.signOut();
    window.location.href = 'index.html';
  });

  loadProfile();
})();
</script>

</body>
</html>
