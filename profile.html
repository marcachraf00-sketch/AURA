<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
  body {
    background: #0f172a;
    color: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    letter-spacing: -0.01em;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .bg-fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    z-index: -1;
  }

  .profile-wrapper {
    width: 340px;                      
    text-align: center;
    padding: 30px 24px;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.2s ease;
  }

  .profile-wrapper:active {
    transform: scale(0.98);
    background: rgba(255, 255, 255, 0.04);
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px 0;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size: 11px;
    font-weight: 700;
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 40px 0;
  }

  .stats-container {
    width: 100%;
    margin-bottom: 40px;
    text-align: left;
  }

  .stat-item {
    margin-bottom: 24px;
  }

  .stat-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 500;
  }

  .stat-label {
    color: #cbd5e1;
  }

  .stat-value {
    font-weight: 600;
  }

  #level-val { color: #38bdf8; }
  #xp-val { color: #34d399; transition: color 0.2s; }

  /* Premium slim neon tracks */
  .progress-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  #level-fill {
    background: linear-gradient(90deg, #0284c7, #38bdf8);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
  }

  #xp-fill {
    background: linear-gradient(90deg, #059669, #34d399);
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.4);
  }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 14px;
    font-weight: 600;
    box-sizing: border-box;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    color: #f1f5f9;
    backdrop-filter: blur(5px);
    transition: all 0.2s ease;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  #loading-msg {
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
    font-weight: 500;
  }
</style>
</head>

<body>

<img src="logo.png" alt="Background Link" class="bg-fullscreen">
<div class="bg-overlay"></div>

<div class="profile-wrapper" id="tap-card">
  <div id="loading-msg">Loading identity record...</div>

  <div id="profile-content" style="display: none; width: 100%;">
    <h1 id="name">Loading...</h1>
    <p class="subtitle">Tap Here to Gain +5 XP</p>

    <div class="stats-container">
      <div class="stat-item">
        <div class="stat-info">
          <span class="stat-label">Level</span>
          <span class="stat-value" id="level-val">1</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="level-fill"></div>
        </div>
      </div>

      <div class="stat-item">
        <div class="stat-info">
          <span class="stat-label">XP</span>
          <span class="stat-value" id="xp-val">0</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="xp-fill"></div>
        </div>
      </div>
    </div>

    <button id="logout-btn" onclick="event.stopPropagation();">Sign Out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  if (!window.supabase) return;

  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  let currentUserId = null;
  let currentXP = 0;
  let currentLevel = 1;

  function updateUI() {
    document.getElementById('level-val').innerText = currentLevel;
    document.getElementById('xp-val').innerText = currentXP + " XP";

    const levelPercent = Math.min((currentLevel / 100) * 100, 100);
    const xpPercent = Math.min((currentXP / 1000) * 100, 100);

    document.getElementById('level-fill').style.width = levelPercent + "%";
    document.getElementById('xp-fill').style.width = xpPercent + "%";
  }

  async function loadProfile(){
    const { data:{user}, error: authError } = await localSupabase.auth.getUser();

    if(authError || !user){
      window.location.href = 'index.html';
      return;
    }

    currentUserId = user.id;

    const { data, error: dbError } = await localSupabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if(data){
      currentLevel = data.level || 1;
      currentXP = data.xp || 0;
      
      if (data.username) {
        document.getElementById('name').innerText = data.username;
      } else {
        document.getElementById('name').innerText = user.email.split('@')[0];
      }
      
      updateUI();
    }

    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  }

  document.getElementById('tap-card').addEventListener('click', async () => {
    if (!currentUserId) return;

    currentXP += 5;
    
    if (currentXP >= 1000) {
      currentXP -= 1000;
      currentLevel += 1;
      document.getElementById('xp-val').style.color = '#38bdf8';
      setTimeout(() => document.getElementById('xp-val').style.color = '#34d399', 500);
    }
    updateUI();

    const { error } = await localSupabase.rpc('increment_xp', { 
      user_id: currentUserId, 
      xp_to_add: 5 
    });

    if (error) {
      console.error("Database update error:", error.message);
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await localSupabase.auth.signOut();
    window.location.href = 'index.html';
  });

  loadProfile();
})();
</script>

</body>
</html>
