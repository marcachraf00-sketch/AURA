<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .profile-wrapper {
    width: 350px;                      
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .profile-wrapper img {
    width: 100%;             
    max-height: 120px;       
    object-fit: cover;       
    border-radius: 15px;     
    margin-bottom: 20px;     
  }

  h1 {
    font-size: 28px;
    margin-bottom: 5px;
    font-weight: bold;
    color: white;
  }

  .subtitle {
    font-size: 14px;
    color: #bdbdbd;
    margin-bottom: 30px;
  }

  .stats-container {
    width: 100%;
    margin-bottom: 30px;
    text-align: left;
  }

  .stat-item {
    margin-bottom: 20px;
  }

  .stat-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 15px;
  }

  .stat-label {
    color: #bdbdbd;
  }

  .stat-value {
    font-weight: bold;
    color: #00ff88;
  }

  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    width: 0%;
    transition: width 0.6s ease-out;
  }

  #level-fill {
    background: #3b82f6;
  }

  #xp-fill {
    background: #00ff88;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    box-sizing: border-box;
    cursor: pointer;
    background: #ffffff15;
    color: white;
    font-weight: bold;
    transition: background 0.2s;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  #loading-msg {
    font-size: 14px;
    color: #bdbdbd;
    text-align: center;
  }
</style>
</head>

<body>

<div class="profile-wrapper">

  <div id="loading-msg">Loading player profile...</div>

  <div id="profile-content" style="display: none; width: 100%;">
    <h1 id="name">Loading...</h1>
    <p class="subtitle">Verified Aura Operator</p>

    <div class="stats-container">
      <div class="stat-item">
        <div class="stat-info">
          <span class="stat-label">Level</span>
          <span class="stat-value" id="level">1</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="level-fill"></div>
        </div>
      </div>

      <div class="stat-item">
        <div class="stat-info">
          <span class="stat-label">XP</span>
          <span class="stat-value" id="xp">0</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="xp-fill"></div>
        </div>
      </div>
    </div>

    <button id="logout-btn">Sign Out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  if (!window.supabase) return;

  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  async function loadProfile(){
    const { data:{user}, error: authError } = await localSupabase.auth.getUser();

    if(authError || !user){
      window.location.href = 'index.html';
      return;
    }

    const { data, error: dbError } = await localSupabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (dbError) {
      console.error("Profile row missing:", dbError.message);
    }

    if(data){
      // 1. Update text displays
      document.getElementById('level').innerText = data.level;
      document.getElementById('xp').innerText = data.xp + " XP";
      if (data.username) {
        document.getElementById('username').innerText = data.username;
      }

      const levelPercent = Math.min((data.level / 100) * 100, 100);
      const xpPercent = Math.min((data.xp / 1000) * 100, 100);

      document.getElementById('level-fill').style.width = levelPercent + "%";
      document.getElementById('xp-fill').style.width = xpPercent + "%";
    }

    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await localSupabase.auth.signOut();
    window.location.href = 'index.html';
  });

  loadProfile();
})();
</script>

</body>
</html>
