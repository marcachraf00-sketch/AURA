<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>

  <style>
    body{
      background:#111827;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      width:350px;
      background:#1f2937;
      padding:40px;
      border-radius:25px;
      text-align:center;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:15px;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#00ff88;
      font-size:16px;
      cursor:pointer;
    }

    #message{
      margin-top:20px;
      color:#ff8080;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Create Account</h1>

  <input id="username" type="text" placeholder="Username">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="signupButton">Create Account</button>
  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  if (!window.supabase) {
    console.error("Supabase CDN failed to load properly.");
    return;
  }

  // Create client on a locally-scoped variable to avoid memory collisions
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  document.getElementById('signupButton').addEventListener('click', async () => {
    const messageElement = document.getElementById('message');
    messageElement.style.color = "#ff8080"; // Default error color

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !email || !password) {
      messageElement.innerText = 'Please fill in all fields.';
      return;
    }

    messageElement.innerText = 'Creating account...';

    try {
      // 1. Sign up user via Supabase Auth
      const { data, error } = await localSupabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        messageElement.innerText = error.message;
        return;
      }

      // Check if user object was successfully created (or if email verification paused it)
      if (!data.user) {
        messageElement.innerText = "Please check your email to confirm registration.";
        return;
      }

      // 2. Insert custom row into profiles table safely
      const { error: profileError } = await localSupabase
        .from('profiles')
        .insert({
          id: data.user.id,
          username: username,
          xp: 0,
          level: 1,
          avatar_url: ''
        });

      if (profileError) {
        messageElement.innerText = "Auth setup worked, but profile creation failed: " + profileError.message;
        return;
      }

      // 3. Success routine
      messageElement.style.color = "#00ff88";
      messageElement.innerText = "Account created! Redirecting...";
      setTimeout(() => {
        window.location.href = 'profile.html';
      }, 1500);

    } catch (err) {
      console.error(err);
      messageElement.innerText = 'Something went wrong. Check developer console.';
    }
  });
})();
</script>

</body>
</html>
