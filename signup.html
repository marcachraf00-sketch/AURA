async function signUp() {

  if (data.user) {

      await supabase
        .from('profiles')
        .insert({
          id: data.user.id,
          username: username,
          xp: 0,
          level: 1,
          avatar_url: ''
        });

    if (profileError) {
      document.getElementById('message').innerText =
        profileError.message;
      return;
    }

    document.getElementById('message').innerText =
      'Account created successfully!';

    setTimeout(() => {
      window.location.href = 'profile.html';
    }, 1000);
  }
}
