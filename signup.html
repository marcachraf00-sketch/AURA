<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

}

.card{
  width:350px;
  background:#1f2937;

}

  width:100%;

}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#00ff88;
  font-size:16px;
  cursor:pointer;
}
</style>

<body>

<div class="card">

<h1>Create Account</h1>

<input

placeholder="Password"

Create Account

async function signUp(){

  // get username, email, password

  const { data, error } =

      email,

  // Step 5 goes here

      });

      'profile.html';
