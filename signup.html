<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A U R A - Sign Up</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .signup-container {
    width: 320px;
    text-align: center;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin: 0 0 30px 0;
  }

  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.02);
    color: white;
    box-sizing: border-box;
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: #34d399;
    background: rgba(255, 255, 255, 0.04);
  }

  button.submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #34d399;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s ease;
  }

  button.submit-btn:hover {
    background: #10b981;
  }

  .footer-links {
    margin-top: 20px;
    font-size: 13px;
    color: #64748b;
  }

  .footer-links a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
  }

  .footer-links a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="signup-container">
  <h1>Join AURA</h1>
  <p class="subtitle">Create your unique network account profile</p>
  
  <input type="email" id="signup-email" placeholder="Email Address">
  <input type="tel" id="signup-phone" placeholder="Phone Number (e.g. +2010...)">
  <input type="password" id="signup-password" placeholder="Choose Password">
  
  <button class="submit-btn" id="signup-action">Register Account</button>

  <div class="footer-links">
    Already have an account? <a href="index.html">Sign In</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Point straight back to your existing Supabase project cluster
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  document.getElementById('signup-action').addEventListener('click', async () => {
    const email = document.getElementById('signup-email').value;
    const phone = document.getElementById('signup-phone').value;
    const password = document.getElementById('signup-password').value;

    if (!email || !phone || !password) {
      alert("Please enter all details to proceed with your registration profile setup.");
      return;
    }

    const { data, error } = await localSupabase.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          phone_number: phone
        }
      }
    });

    if (error) {
      alert("Registration failed: " + error.message);
    } else {
      alert("Account generated! Check your email for a confirmation link if required by your settings configuration.");
      window.location.href = 'profile.html';
    }
  });
</script>

</body>
</html>
