<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>

  <style>
    body{
      background:#111827;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      width:350px;
      background:#1f2937;
      padding:40px;
      border-radius:25px;
      text-align:center;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:15px;
      box-sizing:border-box;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#00ff88;
      font-size:16px;
      cursor:pointer;
    }

    #message{
      margin-top:20px;
      color:#ff8080;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>Create Account</h1>

  <input
    id="username"
    type="text"
    placeholder="Username"
  >

  <input
    id="email"
    type="email"
    placeholder="Email"
  >

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <button id="signupButton">
    Create Account
  </button>

  <p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>  
console.log('script loaded');
 
const supabase = window.supabase.createClient(
  'https://zndniherjshrerioqodx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
);

document
  .getElementById('signupButton')
  .addEventListener('click', signUp);

async function signUp() {
  try {
    const username =
      document.getElementById('username').value.trim();

    const email =
      document.getElementById('email').value.trim();

    const password =
      document.getElementById('password').value;

    if (!username || !email || !password) {
      document.getElementById('message').innerText =
        'Please fill in all fields.';
      return;
    }

    const { data, error } =
      await supabase.auth.signUp({
        email: email,
        password: password
      });

    if (error) {
      document.getElementById('message').innerText =
        error.message;
      return;
    }

    const { error: profileError } =
      await supabase
        .from('profiles')
        .insert({
          id: data.user.id,
          username: username,
          xp: 0,
          level: 1,
          avatar_url: ''
        });

    if (profileError) {
      document.getElementById('message').innerText =
        profileError.message;
      return;
    }

    window.location.href = 'profile.html';

  } catch (err) {
    console.error(err);
    document.getElementById('message').innerText =
      'Something went wrong.';
  }
}
</script>

</body>
</html>
