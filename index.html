async function signUp() {

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const { data, error } =
    await supabase.auth.signUp({
      email,
      password

    document.getElementById('message').innerText =

async function login() {

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const { error } =
    await supabase.auth.signInWithPassword({
      email,
      password
    });

  if (error) {
    document.getElementById('message').innerText =
      error.message;
    return;
  }

  document.getElementById('message').innerText =
    'Logged in successfully!';

  loadProfile();
}

async function uploadAvatar() {

  const file =
    document.getElementById('avatarInput')
    .files[0];

  if (!file) {
    alert('Choose a photo');
    return;
  }

  const {
    data: { user }
  } = await supabase.auth.getUser();

  if (!user) {
    alert('Please login first.');
    return;
  }

  const fileName =
    user.id + "-" + Date.now();

  const { error } =
    await supabase.storage
      .from('avatars')
      .upload(fileName, file);

  if (error) {
    alert(error.message);
    return;
  }

  const { data } =
    supabase.storage
      .from('avatars')
      .getPublicUrl(fileName);

  const publicUrl =
    data.publicUrl;

  document.getElementById('avatar').src =
    publicUrl;

  await supabase
    .from('profiles')
    .update({
      avatar_url: publicUrl
    })
    .eq('id', user.id);

  alert('Photo uploaded!');
}

async function loadProfile() {

  const {
    data: { user }
  } = await supabase.auth.getUser();

  if (!user) return;

  const { data, error } =
    await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

  if (error) return;

  if (data.avatar_url) {
    document.getElementById('avatar').src =
      data.avatar_url;
  }
}

loadProfile();
</script>
