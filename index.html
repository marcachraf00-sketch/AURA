<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Card Login</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  /* Simple, flat rectangular form card */
  .card {
    background: #1e293b;
    width: 300px;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
  }
  .card-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-bottom: 10px;
  }
  input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    box-sizing: border-box;
  }
  input { background: #334155; color: white; }
  .login-btn { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
  .signup-btn { background: transparent; color: #94a3b8; cursor: pointer; }
  #message { margin-top: 15px; color: #f87171; font-size: 14px; }
</style>
</head>

<body>

<div class="card">
  <img src="logo.png" alt="Aura Card Logo">

  <h1>Aura Card</h1>
  <p class="subtitle">Connect. Collect XP. Level Up.</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login-btn" id="submit-login-btn">Login</button>
  <button class="signup-btn" onclick="window.location.href='signup.html'">Create Account</button>

  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  // Check window object safely to bypass memory collision errors
  if (!window.supabase) {
    console.error("Supabase CDN failed to load properly.");
    return;
  }

  // Create client on a locally-scoped variable inside this function
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  // Attach event listener natively via DOM ID
  document.getElementById('submit-login-btn').addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageElement = document.getElementById('message');

    messageElement.style.color = "#ff8080";

    if (!email || !password) {
      messageElement.innerText = "Please fill in all fields.";
      return;
    }

    messageElement.innerText = "Logging in...";

    try {
      const { data, error } = await localSupabase.auth.signInWithPassword({
        email: email,
        password: password,
      });

      if (error) {
        messageElement.style.color = "#ff8080";
        messageElement.innerText = error.message;
      } else {
        messageElement.style.color = "#00ff88";
        messageElement.innerText = "Success! Redirecting...";
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1000);
      }
    } catch (err) {
      console.error("Unexpected runtime rejection:", err);
      messageElement.innerText = "An error occurred. Check browser console.";
    }
  });
})();
</script>

</body>
</html>
