<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A U R A - Home</title>

<style>
  body {
    background: #0f172a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .menu-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: white;
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    z-index: 100;
    transition: all 0.2s ease;
  }

  .menu-btn:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  .side-menu {
    position: fixed;
    top: 0;
    left: -300px;
    width: 280px;
    height: 100vh;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    box-sizing: border-box;
    padding: 80px 24px 24px 24px;
    z-index: 99;
    transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .side-menu.open {
    left: 0;
  }

  .menu-options {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .menu-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: #cbd5e1;
    padding: 14px;
    border-radius: 12px;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .menu-item:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.15);
  }

  .login-container {
    width: 320px;
    text-align: center;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 30px;
    letter-spacing: -0.02em;
  }

  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.02);
    color: white;
    box-sizing: border-box;
  }

  button.submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }

  button.submit-btn:hover {
    background: #2563eb;
  }
</style>
</head>
<body>

<button class="menu-btn" id="menu-toggle">☰</button>

<div class="side-menu" id="drawer-menu">
  <div class="menu-options">
    <div class="menu-item" onclick="window.location.href='what-is-aura.html'">What is Aura?</div>
    <div class="menu-item" onclick="window.location.href='get-my.aura.card.html'">Get My Aura Card</div>
  </div>
</div>

<div class="login-container">
  <h1>A U R A</h1>
  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">
  <button class="submit-btn" id="login-action">Sign In</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Menu Open/Close Toggle Control
  const menuToggle = document.getElementById('menu-toggle');
  const drawerMenu = document.getElementById('drawer-menu');

  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    drawerMenu.classList.toggle('open');
    menuToggle.innerText = drawerMenu.classList.contains('open') ? '✕' : '☰';
  });

  // Close drawer immediately if user clicks on the main screen background area
  document.addEventListener('click', (e) => {
    if (!drawerMenu.contains(e.target) && e.target !== menuToggle) {
      drawerMenu.classList.remove('open');
      menuToggle.innerText = '☰';
    }
  });

  // Supabase Application Initialization Connection
  const localSupabase = window.supabase.createClient(
    'https://zndniherjshrerioqodx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZG5paGVyanNocmVyaW9xb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTE4MTgsImV4cCI6MjA5Nzg2NzgxOH0.WM0zBNAKI9vniV174I99FmEBQ25gB8hti2ZeoshUMTo'
  );

  document.getElementById('login-action').addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { data, error } = await localSupabase.auth.signInWithPassword({ email, password });
    if (error) {
      alert("Error logging in: " + error.message);
    } else {
      window.location.href = 'profile.html';
    }
  });
</script>

</body>
</html>
