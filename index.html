<!DOCTYPE html>

<title>My Aura Card</title>
<style>

<script>
async function uploadAvatar() {

const file =
document.getElementById('avatarInput')
.files[0];

if (!file) {
alert('Choose a photo');
return;
}

const fileName =
Date.now() + "-" + file.name;

const { data, error } =
await supabase.storage
.from('avatars')
.upload(fileName, file);

if (error) {
alert(error.message);
return;
}

const { data: publicUrl } =
supabase.storage
.from('avatars')
.getPublicUrl(fileName);

document.getElementById('avatar').src =
publicUrl.publicUrl;

alert('Photo uploaded!');
}
</script>
